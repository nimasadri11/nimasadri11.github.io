<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Mona Lisa — SVG</title>
<style>
  html, body { margin: 0; height: 100%; background: #1a140d; font-family: Georgia, serif; color: #d8c79a; }
  .frame {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100%; padding: 32px 16px;
  }
  .painting {
    width: min(420px, 90vw);
    aspect-ratio: 3 / 4;
    border: 14px solid #4a2f15;
    border-radius: 4px;
    box-shadow:
      inset 0 0 30px rgba(0,0,0,.6),
      0 25px 60px rgba(0,0,0,.7);
    background: #1a140d;
    overflow: hidden;
  }
  .painting svg { display: block; width: 100%; height: 100%; }
  h1 { font-style: italic; letter-spacing: .15em; margin-top: 24px; font-weight: 400; font-size: 14px; opacity: .7; }
</style>
</head>
<body>
  <div class="frame">
    <div class="painting">
      <svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Sky behind her -->
          <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="#7a8c7e"/>
            <stop offset="60%" stop-color="#a89a6c"/>
            <stop offset="100%" stop-color="#4a3a22"/>
          </linearGradient>

          <!-- Distant misty mountains -->
          <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#6e7a72" stop-opacity=".9"/>
            <stop offset="100%" stop-color="#3a3424" stop-opacity=".95"/>
          </linearGradient>

          <!-- Skin: warm sfumato -->
          <radialGradient id="skin" cx="50%" cy="42%" r="55%">
            <stop offset="0%"  stop-color="#e8c89a"/>
            <stop offset="55%" stop-color="#c9a574"/>
            <stop offset="100%" stop-color="#5a3a1e"/>
          </radialGradient>

          <!-- Cheek blush -->
          <radialGradient id="blush" cx="50%" cy="50%" r="50%">
            <stop offset="0%"  stop-color="#c98a66" stop-opacity=".55"/>
            <stop offset="100%" stop-color="#c98a66" stop-opacity="0"/>
          </radialGradient>

          <!-- Hair: dark with warmth -->
          <radialGradient id="hair" cx="50%" cy="30%" r="80%">
            <stop offset="0%"  stop-color="#3a2410"/>
            <stop offset="100%" stop-color="#0e0805"/>
          </radialGradient>

          <!-- Dress -->
          <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="#2a1a0c"/>
            <stop offset="100%" stop-color="#0a0604"/>
          </linearGradient>

          <!-- Neckline gold trim -->
          <linearGradient id="trim" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"  stop-color="#3a2a14"/>
            <stop offset="50%" stop-color="#8a6a32"/>
            <stop offset="100%" stop-color="#3a2a14"/>
          </linearGradient>

          <!-- Lip -->
          <linearGradient id="lip" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="#a4644a"/>
            <stop offset="100%" stop-color="#6a3a26"/>
          </linearGradient>

          <!-- Sfumato softening filter -->
          <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur stdDeviation=".6"/>
          </filter>
          <filter id="softer" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.4"/>
          </filter>

          <!-- Aged varnish overlay -->
          <radialGradient id="varnish" cx="50%" cy="50%" r="75%">
            <stop offset="0%"  stop-color="#e8c070" stop-opacity="0"/>
            <stop offset="70%" stop-color="#704018" stop-opacity=".15"/>
            <stop offset="100%" stop-color="#1a0a04" stop-opacity=".55"/>
          </radialGradient>
        </defs>

        <!-- Background sky -->
        <rect width="300" height="400" fill="url(#sky)"/>

        <!-- Distant mountains (left + right of head, asymmetric like the original) -->
        <path d="M0,180 L40,150 L70,170 L110,140 L140,165 L140,220 L0,220 Z" fill="url(#mtn)" filter="url(#softer)"/>
        <path d="M160,170 L200,140 L230,160 L270,135 L300,160 L300,220 L160,220 Z" fill="url(#mtn)" filter="url(#softer)"/>

        <!-- Winding river hint -->
        <path d="M40,230 Q90,225 110,240 Q130,255 90,265 Q60,272 40,260 Z" fill="#5a6a5a" opacity=".5" filter="url(#softer)"/>
        <path d="M210,235 Q240,230 270,245" stroke="#6a7a6a" stroke-width="3" fill="none" opacity=".5" filter="url(#softer)"/>

        <!-- Low parapet/ledge behind her shoulders -->
        <rect x="0" y="218" width="300" height="14" fill="#3a2c18" opacity=".75"/>

        <!-- Body / dress (pyramid composition) -->
        <path d="M30,400 L70,260 Q150,235 230,260 L270,400 Z" fill="url(#dress)"/>

        <!-- Hair back layer (falls over shoulders) -->
        <path d="M85,180 Q70,260 95,310 Q110,290 120,275 Q120,230 115,200 Z" fill="url(#hair)"/>
        <path d="M215,180 Q230,260 205,310 Q190,290 180,275 Q180,230 185,200 Z" fill="url(#hair)"/>

        <!-- Neck -->
        <path d="M125,225 Q150,250 175,225 L180,260 Q150,275 120,260 Z" fill="url(#skin)"/>

        <!-- Neckline shadow under chin -->
        <ellipse cx="150" cy="232" rx="22" ry="5" fill="#5a3a1e" opacity=".55" filter="url(#soft)"/>

        <!-- Dress trim / collar -->
        <path d="M95,265 Q150,245 205,265 Q200,275 150,260 Q100,275 95,265 Z" fill="url(#trim)" opacity=".85"/>

        <!-- Face -->
        <ellipse cx="150" cy="170" rx="46" ry="58" fill="url(#skin)"/>

        <!-- Forehead/hairline shadow -->
        <path d="M108,135 Q150,108 192,135 Q188,118 150,110 Q112,118 108,135 Z" fill="#3a2410" opacity=".9" filter="url(#soft)"/>

        <!-- Hair top, parted center, draping over ears -->
        <path d="M104,140 Q150,95 196,140 Q200,160 192,180 Q180,150 150,140 Q120,150 108,180 Q100,160 104,140 Z" fill="url(#hair)"/>
        <!-- Hair side strands falling -->
        <path d="M108,160 Q98,205 108,250 Q120,225 118,190 Z" fill="url(#hair)" filter="url(#soft)"/>
        <path d="M192,160 Q202,205 192,250 Q180,225 182,190 Z" fill="url(#hair)" filter="url(#soft)"/>

        <!-- Cheeks -->
        <ellipse cx="122" cy="185" rx="14" ry="10" fill="url(#blush)"/>
        <ellipse cx="178" cy="185" rx="14" ry="10" fill="url(#blush)"/>

        <!-- Brow shadows (Leonardo famously left brows faint) -->
        <path d="M128,154 Q138,150 148,154" stroke="#6a4a28" stroke-width="1" fill="none" opacity=".35" filter="url(#soft)"/>
        <path d="M152,154 Q162,150 172,154" stroke="#6a4a28" stroke-width="1" fill="none" opacity=".35" filter="url(#soft)"/>

        <!-- Eyes -->
        <g filter="url(#soft)">
          <!-- left -->
          <ellipse cx="135" cy="166" rx="6" ry="2.6" fill="#f4e4c4"/>
          <circle cx="135" cy="166" r="2.4" fill="#5a4222"/>
          <circle cx="135" cy="166" r="1.1" fill="#0a0604"/>
          <circle cx="135.6" cy="165.4" r=".4" fill="#fff" opacity=".8"/>
          <!-- right -->
          <ellipse cx="165" cy="166" rx="6" ry="2.6" fill="#f4e4c4"/>
          <circle cx="165" cy="166" r="2.4" fill="#5a4222"/>
          <circle cx="165" cy="166" r="1.1" fill="#0a0604"/>
          <circle cx="165.6" cy="165.4" r=".4" fill="#fff" opacity=".8"/>
        </g>
        <!-- Upper eyelids -->
        <path d="M129,164 Q135,162 141,164" stroke="#3a2410" stroke-width=".8" fill="none"/>
        <path d="M159,164 Q165,162 171,164" stroke="#3a2410" stroke-width=".8" fill="none"/>

        <!-- Nose: subtle bridge shadow + tip highlight -->
        <path d="M148,170 Q146,185 144,196 Q150,200 156,196 Q154,185 152,170 Z" fill="#a07852" opacity=".45" filter="url(#soft)"/>
        <ellipse cx="150" cy="198" rx="5" ry="2" fill="#f0d6a8" opacity=".6" filter="url(#soft)"/>
        <!-- Nostrils -->
        <ellipse cx="146.5" cy="200" rx="1" ry=".6" fill="#5a3a1e" opacity=".6"/>
        <ellipse cx="153.5" cy="200" rx="1" ry=".6" fill="#5a3a1e" opacity=".6"/>

        <!-- The smile: faint curve, corners blurred for sfumato ambiguity -->
        <g filter="url(#soft)">
          <path d="M134,212 Q150,219 166,212" stroke="#7a4a30" stroke-width="1.2" fill="none"/>
          <path d="M134,212 Q150,216 166,212 Q158,217 150,217 Q142,217 134,212 Z" fill="url(#lip)" opacity=".7"/>
        </g>
        <!-- Corner shadows: the secret of the smile -->
        <ellipse cx="134" cy="213" rx="3" ry="1.5" fill="#3a1e10" opacity=".55" filter="url(#softer)"/>
        <ellipse cx="166" cy="213" rx="3" ry="1.5" fill="#3a1e10" opacity=".55" filter="url(#softer)"/>

        <!-- Chin shadow -->
        <ellipse cx="150" cy="222" rx="10" ry="3" fill="#8a5a32" opacity=".35" filter="url(#soft)"/>

        <!-- Crossed hands hint at bottom -->
        <ellipse cx="150" cy="380" rx="55" ry="14" fill="url(#skin)" opacity=".75" filter="url(#soft)"/>

        <!-- Aged varnish vignette over the whole thing -->
        <rect width="300" height="400" fill="url(#varnish)"/>
      </svg>
    </div>
    <h1>LA GIOCONDA</h1>
  </div>
</body>
</html>
